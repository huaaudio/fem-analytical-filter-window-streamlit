name: Keep Streamlit app warm

on:
  schedule:
    # UTC: twice daily, away from the busy start of the hour
    - cron: "23 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Visit Streamlit app
        env:
          APP_URL: ${{ vars.STREAMLIT_APP_URL || 'https://metavision.streamlit.app' }}
        run: |
          curl \
            --fail \
            --retry 3 \
            --retry-delay 10 \
            --max-time 90 \
            --user-agent "metavision-availability-check/1.0" \
            "${APP_URL%/}/"

      - name: Trigger Streamlit redeploy
        if: ${{ always() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty --message "chore: keep Streamlit app awake [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
