name: Keep Streamlit app warm

on:
  schedule:
    # UTC: every six hours, away from the busy start of the hour
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Visit Streamlit app
        env:
          APP_URL: ${{ vars.STREAMLIT_APP_URL }}
        run: |
          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-delay 10 \
            --max-time 90 \
            --user-agent "metavision-availability-check/1.0" \
            "$APP_URL/"